<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug</title></head>
<body>
<pre id="out">Loading...</pre>
<script>
function parseYaml(src) {
  const lines = src.split('\n');
  let i = 0;
  function readObj(minIndent) {
    const obj = {};
    while (i < lines.length) {
      const raw = lines[i], trimmed = raw.trimStart(), indent = raw.length - trimmed.length;
      if (!trimmed || trimmed[0] === '#') { i++; continue; }
      if (indent < minIndent) break;
      if (trimmed[0] === '-') break;
      const colon = trimmed.indexOf(':');
      if (colon < 0) { i++; continue; }
      const key = trimmed.slice(0, colon).trim();
      const val = trimmed.slice(colon + 1).trim();
      if (!val) {
        i++;
        if (i < lines.length) {
          const nt = lines[i].trimStart(), ni = lines[i].length - nt.length;
          obj[key] = nt[0] === '-' ? readArr(ni) : readObj(ni);
        }
      } else {
        obj[key] = val.replace(/^["']|["']$/g, '').replace(/\\"/g, '"');
        i++;
      }
    }
    return obj;
  }
  function readArr(minIndent) {
    const arr = [];
    while (i < lines.length) {
      const raw = lines[i], trimmed = raw.trimStart(), indent = raw.length - trimmed.length;
      if (!trimmed) { i++; continue; }
      if (indent < minIndent || trimmed[0] !== '-') break;
      const item = {};
      const first = trimmed.slice(2).trim();
      if (first.includes(':')) {
        const c = first.indexOf(':');
        item[first.slice(0, c).trim()] = first.slice(c + 1).trim().replace(/^["']|["']$/g, '').replace(/\\"/g, '"');
      }
      i++;
      while (i < lines.length) {
        const r2 = lines[i], t2 = r2.trimStart(), i2 = r2.length - t2.length;
        if (!t2) { i++; continue; }
        if (i2 <= indent || t2[0] === '-') break;
        const c2 = t2.indexOf(':');
        if (c2 >= 0) item[t2.slice(0, c2).trim()] = t2.slice(c2 + 1).trim().replace(/^["']|["']$/g, '').replace(/\\"/g, '"');
        i++;
      }
      arr.push(item);
    }
    return arr;
  }
  return readObj(0);
}

function parseFrontmatter(raw) {
  const m = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  return { meta: parseYaml(m[1]), body: m[2].trim() };
}

function mdToHtml(md, enhancements) {
  const triggerMap = {};
  (enhancements || []).forEach(e => { if (e.trigger) triggerMap[e.trigger] = e.id; });
  const triggers = Object.keys(triggerMap).sort((a, b) => b.length - a.length);
  return md.split(/\n\n+/).map(para => {
    let p = para.trim();
    if (!p) return '';
    p = p.replace(/\*\*(.+?)\*\*/g, (_, text) => {
      const t = triggers.find(tr => text.includes(tr));
      if (t) return '<span class="enhance-trigger" onclick="togglePanel(\'' + triggerMap[t] + '\')">' + text + '</span>';
      return '<strong>' + text + '</strong>';
    });
    return '<p>' + p + '</p>';
  }).join('\n');
}

fetch('/books/walden/chapter-01-economy.md', {cache: 'no-store'})
  .then(r => r.text())
  .then(text => {
    const { meta, body } = parseFrontmatter(text);
    const enhancements = meta.enhancements || [];
    let prose = mdToHtml(body, enhancements);

    // Simulate panel injection
    const results = enhancements.map(e => {
      const marker = "togglePanel('" + e.id + "')";
      const idx = prose.indexOf(marker);
      if (idx < 0) return { id: e.id, markerFound: false, panelPosition: null };
      const after = prose.indexOf('</p>', idx) + 4;
      // Insert a placeholder instead of real panel HTML
      const placeholder = '[PANEL:' + e.id + ']';
      prose = prose.slice(0, after) + placeholder + prose.slice(after);
      return { id: e.id, markerFound: true, panelPosition: after };
    });

    // Check all placeholders are in prose
    const finalCheck = enhancements.map(e => ({
      id: e.id,
      markerFound: results.find(r => r.id === e.id).markerFound,
      panelInjected: prose.includes('[PANEL:' + e.id + ']')
    }));

    document.getElementById('out').textContent = JSON.stringify(finalCheck, null, 2);
  })
  .catch(e => { document.getElementById('out').textContent = 'ERROR: ' + e.message; });
</script>
</body>
</html>
