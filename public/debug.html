<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug</title></head>
<body>
<pre id="out">Loading...</pre>
<div id="img-tests"></div>
<script>
function parseYaml(src) {
  const lines = src.split('\n');
  let i = 0;
  function readObj(minIndent) {
    const obj = {};
    while (i < lines.length) {
      const raw = lines[i], trimmed = raw.trimStart(), indent = raw.length - trimmed.length;
      if (!trimmed || trimmed[0] === '#') { i++; continue; }
      if (indent < minIndent) break;
      if (trimmed[0] === '-') break;
      const colon = trimmed.indexOf(':');
      if (colon < 0) { i++; continue; }
      const key = trimmed.slice(0, colon).trim();
      const val = trimmed.slice(colon + 1).trim();
      if (!val) {
        i++;
        if (i < lines.length) {
          const nt = lines[i].trimStart(), ni = lines[i].length - nt.length;
          obj[key] = nt[0] === '-' ? readArr(ni) : readObj(ni);
        }
      } else {
        obj[key] = val.replace(/^["']|["']$/g, '').replace(/\\"/g, '"');
        i++;
      }
    }
    return obj;
  }
  function readArr(minIndent) {
    const arr = [];
    while (i < lines.length) {
      const raw = lines[i], trimmed = raw.trimStart(), indent = raw.length - trimmed.length;
      if (!trimmed) { i++; continue; }
      if (indent < minIndent || trimmed[0] !== '-') break;
      const item = {};
      const first = trimmed.slice(2).trim();
      if (first.includes(':')) {
        const c = first.indexOf(':');
        item[first.slice(0, c).trim()] = first.slice(c + 1).trim().replace(/^["']|["']$/g, '').replace(/\\"/g, '"');
      }
      i++;
      while (i < lines.length) {
        const r2 = lines[i], t2 = r2.trimStart(), i2 = r2.length - t2.length;
        if (!t2) { i++; continue; }
        if (i2 <= indent || t2[0] === '-') break;
        const c2 = t2.indexOf(':');
        if (c2 >= 0) item[t2.slice(0, c2).trim()] = t2.slice(c2 + 1).trim().replace(/^["']|["']$/g, '').replace(/\\"/g, '"');
        i++;
      }
      arr.push(item);
    }
    return arr;
  }
  return readObj(0);
}

function parseFrontmatter(raw) {
  const m = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  return { meta: parseYaml(m[1]), body: m[2].trim() };
}

fetch('/books/walden/chapter-01-economy.md', {cache: 'no-store'})
  .then(r => r.text())
  .then(text => {
    const { meta, body } = parseFrontmatter(text);
    const enhancements = meta.enhancements || [];
    document.getElementById('out').textContent = JSON.stringify({
      fileLength: text.length,
      bodyLen: body.length,
      bodyPreview: body.substring(0, 80),
      enhancementCount: enhancements.length,
      enhancements: enhancements.map(e => ({
        id: e.id,
        image_url: e.image_url || '(missing)'
      }))
    }, null, 2);

    // Test API-verified URLs directly, independent of YAML parsing
    const testUrls = [
      { id: 'walden-pond',         url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Walden_Pond.jpg/330px-Walden_Pond.jpg' },
      { id: 'emerson',             url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Ralph_Waldo_Emerson_ca1857_retouched.jpg/330px-Ralph_Waldo_Emerson_ca1857_retouched.jpg' },
      { id: 'thoreau',             url: 'https://upload.wikimedia.org/wikipedia/commons/3/3d/Thoreau.jpg' },
      { id: 'walden-book',         url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Walden_Thoreau.jpg/330px-Walden_Thoreau.jpg' },
      { id: 'old-north-bridge',    url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Minute_Man_National_Historical_Park_MIMA0070.jpg/330px-Minute_Man_National_Historical_Park_MIMA0070.jpg' },
      { id: 'railroad',            url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/East_and_West_Shaking_hands_at_the_laying_of_last_rail_Union_Pacific_Railroad_-_Restoration.jpg/330px-East_and_West_Shaking_hands_at_the_laying_of_last_rail_Union_Pacific_Railroad_-_Restoration.jpg' },
      { id: 'lowell-mills',        url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/2_Young_Women.jpg/330px-2_Young_Women.jpg' }
    ];
    const container = document.getElementById('img-tests');
    container.innerHTML = '<p><b>API-verified URL tests:</b></p>';
    testUrls.forEach(e => {
      const row = document.createElement('div');
      row.style.marginBottom = '8px';
      const img = document.createElement('img');
      img.src = e.url;
      img.style.cssText = 'width:80px;height:60px;object-fit:cover;vertical-align:middle;margin-right:8px;border:1px solid #ccc';
      const status = document.createElement('span');
      status.textContent = '⏳ ' + e.id + ' — ';
      const link = document.createElement('a');
      link.href = e.url;
      link.target = '_blank';
      link.textContent = 'open';
      img.onload  = () => { status.textContent = '✅ ' + e.id + ' — '; };
      img.onerror = () => { status.textContent = '❌ ' + e.id + ' — '; };
      row.appendChild(img);
      row.appendChild(status);
      row.appendChild(link);
      container.appendChild(row);
    });
  })
  .catch(e => { document.getElementById('out').textContent = 'FETCH ERROR: ' + e.message; });
</script>
</body>
</html>
