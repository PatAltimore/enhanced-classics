<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Classics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <meta name="theme-color" content="#5c4a2a">
</head>
<body>
  <div id="app">
    <header>
      <div id="nav-btns">
        <button id="back-btn" aria-label="Back">← Back</button>
        <button id="home-btn" aria-label="Library">⌂ <span class="btn-label">Library</span></button>
      </div>
      <h1 id="header-title">Enhanced Classics</h1>
      <div id="header-controls">
        <div id="font-size-ctrl" aria-label="Text size">
          <button class="fs-btn" data-size="" aria-label="Small text">A</button>
          <button class="fs-btn" data-size="font-md" aria-label="Medium text">A</button>
          <button class="fs-btn" data-size="font-lg" aria-label="Large text">A</button>
        </div>
        <div id="theme-ctrl" aria-label="Theme">
          <button class="theme-btn" data-theme="" aria-label="Sepia theme">Aa</button>
          <button class="theme-btn" data-theme="theme-white" aria-label="White theme">Aa</button>
        </div>
      </div>
    </header>
    <main id="main-content">
      <div id="loading">Loading…</div>
    </main>

    <div id="def-popup">
      <div id="def-popup-card" role="dialog" aria-labelledby="def-popup-word">
        <div id="def-popup-head">
          <span id="def-popup-word"></span>
          <button id="def-popup-close" aria-label="Close">&#215;</button>
        </div>
        <div id="def-popup-body"></div>
        <div id="def-popup-foot">
          <a id="def-popup-mw" target="_blank" rel="noopener">Search Merriam-Webster &#8594;</a>
        </div>
      </div>
    </div>
  </div>
  <div id="install-modal" aria-hidden="true">
    <div id="install-modal-card" role="dialog" aria-labelledby="install-modal-title">
      <div id="install-modal-head">
        <span id="install-modal-title">+ Add to device home screen</span>
        <button id="install-modal-close" aria-label="Close">&#215;</button>
      </div>
      <div id="install-modal-body"></div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
