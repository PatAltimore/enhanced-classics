  - slug: "hamlet"
    title: "Hamlet"
    author: "William Shakespeare"
    year: 1603
    # Gutenberg ID 1524.  Act headings: "ACT I", "ACT II" etc. (no period, no indent).
    # Hamlet has 5 acts but books.yaml has 6 thematic chapters.
    # Use gutenberg_n per chapter to specify which Act to use; Acts III-V
    # will need to be hand-trimmed to scene boundaries after fetch.
    gutenberg_id: 1524
    gutenberg_split: pattern
    gutenberg_re: '^ACT [IVXLC]+$'
    gutenberg_heading_lines: 1
    description: >
      Prince Hamlet of Denmark is visited by his father's ghost, who reveals
      he was murdered by Hamlet's uncle Claudius, now king. Torn between
      grief, doubt, and the demand for revenge, Hamlet's hesitation spirals
      into madness — real and feigned — destroying everyone around him.
    chapters:
      - number: 1
        title: "The Ghost's Warning"
        slug: "chapter-01-the-ghosts-warning"
        gutenberg_n: 1   # Act I
      - number: 2
        title: "The Players Arrive"
        slug: "chapter-02-the-players-arrive"
        gutenberg_n: 2   # Act II
      - number: 3
        title: "The Mousetrap"
        slug: "chapter-03-the-mousetrap"
        gutenberg_n: 3   # Act III (hand-trim to scenes 1–3 if desired)
      - number: 4
        title: "The Killing of Polonius"
        slug: "chapter-04-the-killing-of-polonius"
        gutenberg_n: 3   # Act III scenes 4–5 overlap; hand-trim after fetch
      - number: 5
        title: "Ophelia's Madness"
        slug: "chapter-05-ophelias-madness"
        gutenberg_n: 4   # Act IV
      - number: 6
        title: "The Final Reckoning"
        slug: "chapter-06-the-final-reckoning"
        gutenberg_n: 5   # Act V
