  - slug: "journey-to-the-center-of-the-earth"
    title: "Journey to the Center of the Earth"
    author: "Jules Verne"
    year: 1864
    # Gutenberg ID 18857.  TOC has "CHAPTER 1 SUBTITLE" (with subtitle on same line);
    # actual chapter headings are just "CHAPTER 1" with no subtitle.
    gutenberg_id: 18857
    gutenberg_split: pattern
    gutenberg_re: '^CHAPTER \d+$'
    gutenberg_heading_lines: 1
    description: >
      Professor Otto Lidenbrock discovers a cryptic runic message pointing to
      a passage into the Earth's interior. With his nephew Axel and Icelandic
      guide Hans, he descends into the volcano Snæfells and journeys through
      a vast underground world of prehistoric seas, ancient forests, and
